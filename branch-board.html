<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>شاشة عمليات الفرع - حلواني الفايدي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- مكتبات فايربيز -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .header { background: #004d4d; color: #EEDC82; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 20px; font-weight: 900; }
        
        .login-section { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border-top: 5px solid #004d4d; }
        .login-box select { width: 100%; padding: 12px; margin-top: 20px; border-radius: 8px; border: 2px solid #ccc; font-family: 'Cairo'; font-weight: bold; outline: none; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; border: none; background: #004d4d; color: white; font-family: 'Cairo'; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .login-box button:hover { background: #EEDC82; color: #004d4d; }

        .dashboard { display: none; padding: 20px; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .order-card { background: white; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 2px solid #eee; overflow: hidden; position: relative; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .order-card.pending { border-color: #e74c3c; box-shadow: 0 0 15px rgba(231, 76, 60, 0.3); }
        .order-card.accepted { border-color: #f39c12; }
        
        .order-header { padding: 12px 15px; color: white; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .pending .order-header { background: #e74c3c; }
        .accepted .order-header { background: #f39c12; }
        
        .order-body { padding: 15px; }
        .customer-info { background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 14px; border: 1px dashed #ccc; }
        .customer-info span { font-weight: bold; color: #004d4d; }
        
        .items-list { list-style: none; padding: 0; margin: 0 0 15px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .items-list li { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; font-weight: bold; }
        
        .total-price { text-align: left; font-size: 18px; font-weight: 900; color: #d35400; margin-bottom: 15px; }
        
        .actions { display: flex; gap: 10px; }
        .btn-act { flex: 1; padding: 10px; border: none; border-radius: 6px; font-family: 'Cairo'; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; font-size: 14px; }
        .btn-accept { background: #27ae60; }
        .btn-reject { background: #c0392b; }
        .btn-complete { background: #3498db; }
        .btn-act:hover { filter: brightness(1.1); }

        .empty-state { text-align: center; color: #7f8c8d; font-weight: bold; padding: 50px; grid-column: 1 / -1; font-size: 18px; }
    </style>
</head>
<body>

    <!-- التنبيه الصوتي للطلبات الجديدة -->
    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <div class="header">
        <h1>حلواني الفايدي - شاشة العمليات</h1>
        <div id="branch-name-display" style="font-weight: bold; font-size: 14px;">الرجاء تسجيل الدخول</div>
    </div>

    <!-- شاشة اختيار الفرع -->
    <div class="login-section" id="login-section">
        <div class="login-box">
            <h2 style="color: #004d4d; margin-top:0;">تسجيل دخول الفرع</h2>
            <select id="branch-select">
                <option value="" disabled selected>جاري تحميل الفروع...</option>
            </select>
            <button onclick="loginBranch()">دخول لِشاشة الاستقبال 🚀</button>
        </div>
    </div>

    <!-- شاشة الطلبات الحية -->
    <div class="dashboard" id="dashboard">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="color: #004d4d; margin: 0;">الطلبات النشطة (Live)</h2>
            <div style="display:flex; gap:10px;">
                <span style="background:#e74c3c; color:white; padding:5px 10px; border-radius:15px; font-size:12px; font-weight:bold;">قيد الانتظار: <span id="count-pending">0</span></span>
                <span style="background:#f39c12; color:white; padding:5px 10px; border-radius:15px; font-size:12px; font-weight:bold;">قيد التجهيز: <span id="count-accepted">0</span></span>
            </div>
        </div>
        <div class="orders-grid" id="orders-grid">
            <!-- ستظهر الطلبات هنا -->
        </div>
    </div>

    <script>
        // إعدادات فايربيز
        firebase.initializeApp({ databaseURL: "https://faidy-web-app-default-rtdb.firebaseio.com", projectId: "faidy-web-app" });
        const dbCloud = firebase.database();
        const ROOT_PATH = 'FAIDY_OMS_V2/';
        
        let currentBranch = null;
        let activeOrders = {};

        // تحميل الفروع في شاشة الدخول
        window.onload = () => {
            dbCloud.ref('OMS_SAAS_V1/Companies/faidy/settings/branches').once('value').then(snap => {
                let sel = document.getElementById('branch-select');
                if(snap.exists()) {
                    sel.innerHTML = '<option value="" disabled selected>-- اختر الفرع الخاص بك --</option>';
                    snap.val().forEach(b => { if(b) sel.innerHTML += `<option value="${b.id}">${b.name}</option>`; });
                } else {
                    sel.innerHTML = '<option value="">لا توجد فروع مسجلة</option>';
                }
            });
        };

        function loginBranch() {
            let sel = document.getElementById('branch-select');
            if(!sel.value) return alert("الرجاء اختيار الفرع أولاً");
            
            currentBranch = sel.value;
            let branchText = sel.options[sel.selectedIndex].text;
            
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('branch-name-display').innerText = "📍 فرع: " + branchText;
            
            // طلب إذن تشغيل الصوت من المتصفح (مهم جداً)
            document.getElementById('alertSound').play().catch(e => console.log("المتصفح يمنع التشغيل التلقائي للصوت حتى يتفاعل المستخدم"));

            startListeningToOrders();
        }

        function startListeningToOrders() {
            let ordersRef = dbCloud.ref(ROOT_PATH + 'Live_Orders/' + currentBranch);
            
            // عند إضافة طلب جديد أو تحديث طلب موجود
            ordersRef.on('value', snap => {
                activeOrders = snap.val() || {};
                renderOrders();
            });

            // مراقبة الطلبات الجديدة فقط لإطلاق جرس التنبيه
            ordersRef.on('child_added', snap => {
                let order = snap.val();
                if(order.status === 'pending') {
                    playSound();
                }
            });
        }

        function playSound() {
            let audio = document.getElementById('alertSound');
            audio.currentTime = 0;
            audio.play().catch(e => {});
        }

        function renderOrders() {
            let grid = document.getElementById('orders-grid');
            grid.innerHTML = '';
            
            let pendingCount = 0;
            let acceptedCount = 0;
            
            let ordersArray = Object.values(activeOrders).sort((a,b) => b.timestamp - a.timestamp); // الأحدث أولاً
            
            if(ordersArray.filter(o => o.status === 'pending' || o.status === 'accepted').length === 0) {
                grid.innerHTML = '<div class="empty-state">☕ لا توجد طلبات نشطة حالياً. الشاشة في وضع الاستعداد...</div>';
            }

            ordersArray.forEach(order => {
                if(order.status === 'completed' || order.status === 'rejected') return; // لا نعرض الطلبات المنتهية هنا
                
                if(order.status === 'pending') pendingCount++;
                if(order.status === 'accepted') acceptedCount++;

                let timeString = new Date(order.timestamp).toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});
                
                let methodLabel = order.customer.method === 'delivery' ? '🛵 توصيل' : '🚶‍♂️ استلام من الفرع';
                
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `<li><span>${item.qty}x ${item.name}</span> <span>${(item.price * item.qty).toFixed(2)}</span></li>`;
                });

                let buttonsHtml = '';
                if(order.status === 'pending') {
                    buttonsHtml = `
                        <button class="btn-act btn-accept" onclick="updateOrderStatus(${order.id}, 'accepted')">✅ قبول (بدء التجهيز)</button>
                        <button class="btn-act btn-reject" onclick="rejectOrder(${order.id})">❌ رفض الطلب</button>
                    `;
                } else if (order.status === 'accepted') {
                    let completeText = order.customer.method === 'delivery' ? '🛵 تسليم للمندوب' : '📦 تسليم للزبون';
                    buttonsHtml = `
                        <button class="btn-act btn-complete" onclick="updateOrderStatus(${order.id}, 'completed')">${completeText}</button>
                    `;
                }

                grid.innerHTML += `
                    <div class="order-card ${order.status}">
                        <div class="order-header">
                            <span>طلب #${order.id}</span>
                            <span>⏱️ ${timeString}</span>
                        </div>
                        <div class="order-body">
                            <div class="customer-info">
                                <div><span>الاسم:</span> ${order.customer.name}</div>
                                <div><span>الهاتف:</span> <a href="tel:${order.customer.phone}" style="color:#004d4d;">${order.customer.phone}</a></div>
                                <div><span>الاستلام:</span> ${methodLabel}</div>
                                ${order.customer.method === 'delivery' ? `<div style="margin-top:5px; color:#c0392b; font-weight:bold;">📍 العنوان: ${order.customer.address}</div>` : ''}
                            </div>
                            
                            <ul class="items-list">
                                ${itemsHtml}
                            </ul>
                            
                            <div class="total-price">الإجمالي: ${order.totalAmount.toFixed(2)} د.ل</div>
                            
                            <div class="actions">
                                ${buttonsHtml}
                            </div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('count-pending').innerText = pendingCount;
            document.getElementById('count-accepted').innerText = acceptedCount;
        }

        function updateOrderStatus(orderId, newStatus) {
            dbCloud.ref(ROOT_PATH + 'Live_Orders/' + currentBranch + '/' + orderId).update({
                status: newStatus
            });
        }

        function rejectOrder(orderId) {
            let reason = prompt("ما هو سبب الرفض؟ (سيظهر للزبون)");
            if(reason === null) return; // تم الإلغاء
            dbCloud.ref(ROOT_PATH + 'Live_Orders/' + currentBranch + '/' + orderId).update({
                status: 'rejected',
                rejectReason: reason || "نعتذر، ضغط عمل حالياً."
            });
        }
    </script>
</body>
</html>
